services:
  - type: web
    name: pintofruta-store
    env: node
    plan: starter
    buildCommand: npm ci && npm run build
    startCommand: npm run start
    autoDeploy: true
    healthCheckPath: /
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: UPLOADS_DIR
        value: /opt/render/project/src/public/uploads
    disk:
      name: pintofruta-uploads
      mountPath: /opt/render/project/src/public/uploads
      sizeGB: 1
