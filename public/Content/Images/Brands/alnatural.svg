<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 180">
    <defs>
        <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.25"></feDropShadow>
        </filter>
    </defs>

    <!-- Cuadros -->
    <g filter="url(#shadow)">
        <rect x="20" y="25" width="42" height="42" rx="4" fill="#d84343"></rect>
        <rect x="64" y="25" width="42" height="42" rx="4" fill="#f2c230"></rect>
        <rect x="20" y="69" width="42" height="42" rx="4" fill="#3366cc"></rect>
        <rect x="64" y="69" width="42" height="42" rx="4" fill="#8e44ad"></rect>
    </g>

    <!-- Letras -->
    <g font-family="Georgia, serif" font-size="28" font-weight="bold" fill="white" text-anchor="middle">
        <text x="41" y="54">A</text>
        <text x="85" y="54">N</text>
        <text x="41" y="98">C</text>
        <text x="85" y="98">E</text>
    </g>

    <!-- Texto -->
    <text x="135" y="85" font-family="Times New Roman, serif" font-size="54" font-weight="bold" fill="#b3262d" stroke="white" stroke-width="7" paint-order="stroke">
        AL NATURAL
    </text>

    <!-- Hoja -->
    <g transform="translate(610,20)">
        <path d="M25,70
                 C60,50 70,15 50,0
                 C25,10 5,40 10,65
                 C13,78 18,88 25,95
                 C30,83 36,73 48,55" fill="#2ca84f"></path>
        <path d="M25 90 C28 70 34 50 50 20" stroke="#ffffff" stroke-width="3" fill="none"></path>
    </g>
</svg>